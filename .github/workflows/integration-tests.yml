name: Integration Tests

on:
  repository_dispatch:
    types: [wanaku-build-completed]

  schedule:
    # Nightly at 03:17 UTC
    - cron: '17 3 * * *'

  workflow_dispatch:
    inputs:
      version:
        description: 'Wanaku version to test (e.g., 0.3.0-SNAPSHOT or 0.2.0)'
        required: false
        default: ''

env:
  # Update when upstream development version changes
  DEFAULT_SNAPSHOT_VERSION: '0.2.0-SNAPSHOT'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ env.DEFAULT_SNAPSHOT_VERSION }}"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::No version could be determined"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Download artifacts
        run: |
          chmod +x ./artifacts/download.sh
          ./artifacts/download.sh "${{ steps.version.outputs.version }}"

      - name: Resolve CLI path
        id: cli
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLI_DIR=$(ls -d artifacts/wanaku-cli-${VERSION}* 2>/dev/null | head -1)
          if [ -z "$CLI_DIR" ]; then
            echo "::warning::CLI directory not found for version ${VERSION}"
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            CLI_PATH="${CLI_DIR}/bin/wanaku"
            chmod +x "${CLI_PATH}" 2>/dev/null || true
            echo "path=$(pwd)/${CLI_PATH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        run: |
          CLI_OPTS=""
          if [ -n "${{ steps.cli.outputs.path }}" ]; then
            CLI_OPTS="-Dwanaku.test.cli.path=${{ steps.cli.outputs.path }}"
          fi
          mvn -B verify --fail-at-end --file pom.xml ${CLI_OPTS}

      - name: Test summary
        if: always()
        run: ./.github/scripts/test-summary.sh

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-reports
          path: |
            **/target/failsafe-reports/
            **/target/logs/
          retention-days: 14
          if-no-files-found: ignore
